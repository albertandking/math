site_name: 机器学习数学教材
site_description: 面向机器学习初学者的中文数学学习教材
site_url: https://albertandking.github.io/math/
repo_name: albertandking/math
repo_url: https://github.com/albertandking/math

docs_dir: site_docs
site_dir: site
use_directory_urls: true

exclude_docs: |
  .*
  assets/**/README.md

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 前言: docs/preface.md
  - 教材总览:
      - 学习路径: docs/learning-path.md
      - 章节目录: chapters/README.md
      - 章节依赖关系与先修地图: docs/chapter-dependency-map.md
      - 教材总纲: docs/book-outline.md
      - 配图与举例规范: docs/visual-guidelines.md
  - 正文:
      - 第 1 章 数学准备与公式阅读: chapters/01-foundations.md
      - 第 2 章 函数、图像与变化率: chapters/02-functions-and-change.md
      - 第 3 章 向量与几何直觉: chapters/03-vectors-and-geometry.md
      - 第 4 章 矩阵与线性变换: chapters/04-matrices-and-transformations.md
      - 第 5 章 特征值、特征向量与奇异值分解: chapters/05-eigenvalues-and-svd.md
      - 第 6 章 一元微积分基础: chapters/06-single-variable-calculus.md
      - 第 7 章 多元微积分与梯度: chapters/07-multivariable-calculus.md
      - 第 8 章 优化方法: chapters/08-optimization.md
      - 第 9 章 概率论基础: chapters/09-probability-basics.md
      - 第 10 章 随机变量与常见分布: chapters/10-random-variables-and-distributions.md
      - 第 11 章 统计学基础与估计: chapters/11-statistics-and-inference.md
      - 第 12 章 线性模型中的数学: chapters/12-linear-models.md
      - 第 13 章 神经网络的数学基础: chapters/13-neural-network-math.md
      - 第 14 章 通过模型复盘数学: chapters/14-math-review-through-models.md
      - 第 15 章 矩阵微积分与自动求导: chapters/15-matrix-calculus-and-autodiff.md
      - 第 16 章 最大似然、最大后验与概率建模: chapters/16-likelihood-bayes-and-probabilistic-modeling.md
      - 第 17 章 信息论基础: chapters/17-information-theory.md
      - 第 18 章 凸优化与约束优化: chapters/18-convex-and-constrained-optimization.md
      - 第 19 章 泛化、正则化与偏差-方差: chapters/19-generalization-regularization-and-bias-variance.md
      - 第 20 章 卷积、序列与注意力的数学入口: chapters/20-convolutions-sequences-and-attention.md
  - 附录:
    - 附录 A 术语、符号、读法与名词对照: docs/appendix/notation-glossary.md
    - 附录 B 公式阅读速查: docs/appendix/formula-reading-guide.md
    - 附录 C 习题参考与思路: docs/appendix/exercise-hints.md

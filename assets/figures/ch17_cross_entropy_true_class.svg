<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">Cross entropy focuses on the true class</title>
  <desc id="desc">A comparison between a one-hot target distribution and a predicted distribution highlights that cross entropy mainly penalizes the probability assigned to the true class.</desc>
  <rect width="760" height="520" fill="#ffffff"/>

  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif">
    <text x="66" y="56" font-size="28" font-weight="bold">With one-hot labels, cross entropy mainly watches the true class</text>
    <text x="66" y="86" font-size="19">When p = (1, 0, 0), the whole loss effectively reduces to -log q_true.</text>
  </g>

  <g fill="#f8fbff" stroke="#bfd3e6" stroke-width="2.5">
    <rect x="72" y="126" width="250" height="270" rx="18"/>
    <rect x="438" y="126" width="250" height="270" rx="18"/>
  </g>

  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold">
    <text x="197" y="160" text-anchor="middle">target distribution p</text>
    <text x="563" y="160" text-anchor="middle">prediction q</text>
  </g>

  <g stroke="#d9e2ec" stroke-width="1.5">
    <line x1="108" y1="350" x2="286" y2="350"/>
    <line x1="474" y1="350" x2="652" y2="350"/>
  </g>

  <g fill="#7c3aed">
    <rect x="126" y="170" width="36" height="180" rx="6"/>
    <rect x="178" y="332" width="36" height="18" rx="6"/>
    <rect x="230" y="332" width="36" height="18" rx="6"/>
  </g>
  <g fill="#3366cc">
    <rect x="492" y="224" width="36" height="126" rx="6"/>
    <rect x="544" y="314" width="36" height="36" rx="6"/>
    <rect x="596" y="332" width="36" height="18" rx="6"/>
  </g>

  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <text x="144" y="376" text-anchor="middle">class 1</text>
    <text x="196" y="376" text-anchor="middle">class 2</text>
    <text x="248" y="376" text-anchor="middle">class 3</text>
    <text x="510" y="376" text-anchor="middle">class 1</text>
    <text x="562" y="376" text-anchor="middle">class 2</text>
    <text x="614" y="376" text-anchor="middle">class 3</text>
  </g>

  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="19">
    <text x="198" y="196">only the first class is true</text>
    <text x="564" y="198">q = (0.7, 0.2, 0.1)</text>
  </g>

  <g stroke="#d97706" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="162" y1="214" x2="492" y2="252"/>
    <polyline points="472,238 496,253 470,269"/>
  </g>
  <g fill="#d97706" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">
    <text x="266" y="216">cross entropy mainly follows this bar</text>
  </g>

  <g fill="#334e68" font-family="Arial, Helvetica, sans-serif" font-size="19">
    <text x="112" y="434">H(p, q) = -1·log 0.7 - 0·log 0.2 - 0·log 0.1</text>
    <text x="112" y="462">so the loss mainly asks whether the true class probability is high enough</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="760" height="540" viewBox="0 0 760 540" role="img" aria-labelledby="title desc">
  <title id="title">Likelihood and MAP flow</title>
  <desc id="desc">A flow diagram shows parameters defining a probabilistic model, which explains observed data. Maximum likelihood selects parameters by data fit, while maximum a posteriori adds a prior preference before selecting parameters.</desc>
  <rect width="760" height="540" fill="#ffffff"/>

  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif">
    <text x="66" y="58" font-size="28" font-weight="bold">From parameters to data, then back to parameter choice</text>
    <text x="66" y="90" font-size="19">Maximum likelihood asks which parameter explains the observed data best.</text>
    <text x="66" y="116" font-size="19">Maximum a posteriori keeps that question and adds a prior preference.</text>
  </g>

  <g fill="#eef6ff" stroke="#3366cc" stroke-width="3">
    <rect x="70" y="156" width="170" height="88" rx="14"/>
    <rect x="292" y="156" width="190" height="88" rx="14"/>
    <rect x="540" y="156" width="150" height="88" rx="14"/>
  </g>

  <g fill="#fff6e5" stroke="#d97706" stroke-width="3">
    <rect x="86" y="344" width="190" height="102" rx="16"/>
    <rect x="322" y="344" width="182" height="102" rx="16"/>
  </g>

  <g fill="#f5f3ff" stroke="#7c3aed" stroke-width="3">
    <rect x="550" y="322" width="150" height="74" rx="14"/>
  </g>

  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif">
    <text x="155" y="192" text-anchor="middle" font-size="26" font-weight="bold">parameter θ</text>
    <text x="155" y="220" text-anchor="middle" font-size="18">mean, variance, weights</text>

    <text x="387" y="192" text-anchor="middle" font-size="25" font-weight="bold">probabilistic model</text>
    <text x="387" y="220" text-anchor="middle" font-size="18">θ defines a distribution</text>

    <text x="615" y="192" text-anchor="middle" font-size="25" font-weight="bold">observed data D</text>
    <text x="615" y="220" text-anchor="middle" font-size="18">what we actually saw</text>

    <text x="181" y="378" text-anchor="middle" font-size="24" font-weight="bold">maximize</text>
    <text x="181" y="407" text-anchor="middle" font-size="22">P(D | θ)</text>
    <text x="181" y="435" text-anchor="middle" font-size="18">pick the parameter that</text>
    <text x="181" y="458" text-anchor="middle" font-size="18">best explains the data</text>

    <text x="413" y="378" text-anchor="middle" font-size="24" font-weight="bold">maximize</text>
    <text x="413" y="407" text-anchor="middle" font-size="22">P(D | θ) P(θ)</text>
    <text x="413" y="435" text-anchor="middle" font-size="18">fit the data, but also keep</text>
    <text x="413" y="458" text-anchor="middle" font-size="18">a prior preference</text>

    <text x="625" y="351" text-anchor="middle" font-size="24" font-weight="bold">prior P(θ)</text>
    <text x="625" y="378" text-anchor="middle" font-size="18">prefer smaller or more</text>
    <text x="625" y="400" text-anchor="middle" font-size="18">reasonable parameters</text>
  </g>

  <g stroke="#486581" stroke-width="4" stroke-linecap="round" fill="none">
    <line x1="240" y1="200" x2="292" y2="200"/>
    <polyline points="275,183 296,200 275,217"/>
    <line x1="482" y1="200" x2="540" y2="200"/>
    <polyline points="523,183 544,200 523,217"/>

    <line x1="615" y1="244" x2="615" y2="294"/>
    <polyline points="598,278 615,298 632,278"/>

    <line x1="615" y1="294" x2="181" y2="294"/>
    <line x1="181" y1="294" x2="181" y2="344"/>
    <polyline points="164,328 181,348 198,328"/>

    <line x1="615" y1="294" x2="413" y2="294"/>
    <line x1="413" y1="294" x2="413" y2="344"/>
    <polyline points="396,328 413,348 430,328"/>
  </g>

  <g stroke="#7c3aed" stroke-width="4" stroke-linecap="round" fill="none">
    <line x1="550" y1="359" x2="504" y2="395"/>
    <polyline points="510,372 500,398 531,399"/>
  </g>

  <g fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <text x="299" y="284">same observed data</text>
    <text x="278" y="314">but two different ways to choose θ</text>
    <text x="76" y="512">MLE uses only data fit. MAP uses data fit plus a prior preference.</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="780" height="560" viewBox="0 0 780 560" role="img" aria-labelledby="title desc">
  <title id="title">Gradient Descent Paths with Different Learning Rates</title>
  <desc id="desc">Contour lines with two update paths: a stable small-step path and an oscillating large-step path across a narrow valley.</desc>
  <rect width="780" height="560" fill="#ffffff"/>

  <g stroke="#d9e2ec" stroke-width="1">
    <line x1="80" y1="480" x2="720" y2="480"/>
    <line x1="80" y1="400" x2="720" y2="400"/>
    <line x1="80" y1="320" x2="720" y2="320"/>
    <line x1="80" y1="240" x2="720" y2="240"/>
    <line x1="80" y1="160" x2="720" y2="160"/>
    <line x1="120" y1="90" x2="120" y2="500"/>
    <line x1="240" y1="90" x2="240" y2="500"/>
    <line x1="360" y1="90" x2="360" y2="500"/>
    <line x1="480" y1="90" x2="480" y2="500"/>
    <line x1="600" y1="90" x2="600" y2="500"/>
  </g>

  <g stroke="#102a43" stroke-width="2">
    <line x1="80" y1="480" x2="720" y2="480"/>
    <line x1="120" y1="500" x2="120" y2="90"/>
  </g>
  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="20">
    <text x="708" y="507">w1</text>
    <text x="99" y="106">w2</text>
  </g>

  <g fill="none" stroke="#7b8794" stroke-width="2.4">
    <ellipse cx="420" cy="310" rx="52" ry="24" transform="rotate(-18 420 310)"/>
    <ellipse cx="420" cy="310" rx="95" ry="42" transform="rotate(-18 420 310)"/>
    <ellipse cx="420" cy="310" rx="145" ry="62" transform="rotate(-18 420 310)"/>
    <ellipse cx="420" cy="310" rx="205" ry="84" transform="rotate(-18 420 310)"/>
  </g>

  <g fill="#222222">
    <circle cx="420" cy="310" r="7"/>
  </g>
  <g fill="#334e68" font-family="Arial, Helvetica, sans-serif" font-size="20">
    <text x="433" y="304">valley bottom</text>
  </g>

  <g stroke="#2f855a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="615,170 560,205 520,235 487,258 462,277 444,293 432,303 423,309"/>
  </g>
  <g fill="#2f855a">
    <circle cx="615" cy="170" r="7"/>
    <circle cx="560" cy="205" r="6"/>
    <circle cx="520" cy="235" r="6"/>
    <circle cx="487" cy="258" r="6"/>
    <circle cx="462" cy="277" r="6"/>
    <circle cx="444" cy="293" r="6"/>
    <circle cx="432" cy="303" r="6"/>
    <circle cx="423" cy="309" r="6"/>
  </g>

  <g stroke="#cc6633" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="245,155 575,420 315,208 548,392 355,238 507,355 390,266 452,323"/>
  </g>
  <g fill="#cc6633">
    <circle cx="245" cy="155" r="7"/>
    <circle cx="575" cy="420" r="6"/>
    <circle cx="315" cy="208" r="6"/>
    <circle cx="548" cy="392" r="6"/>
    <circle cx="355" cy="238" r="6"/>
    <circle cx="507" cy="355" r="6"/>
    <circle cx="390" cy="266" r="6"/>
    <circle cx="452" cy="323" r="6"/>
  </g>

  <g fill="#2f855a" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold">
    <text x="552" y="156">small learning rate</text>
  </g>
  <g fill="#cc6633" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold">
    <text x="126" y="137">large learning rate</text>
  </g>
  <g fill="#486581" font-family="Arial, Helvetica, sans-serif" font-size="19">
    <text x="512" y="456">stable path takes smaller steps</text>
    <text x="126" y="455">overshooting causes the path to bounce</text>
  </g>
  <g fill="#334e68" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <text x="144" y="110">contours show the loss landscape</text>
  </g>
</svg>

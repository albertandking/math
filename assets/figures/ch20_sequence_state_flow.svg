<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500" role="img" aria-labelledby="title desc">
  <title id="title">Sequence state carries context forward</title>
  <desc id="desc">A sequence of inputs x1, x2, x3 updates hidden states h1, h2, h3 so that each new state combines the current input with the memory carried from earlier steps.</desc>
  <rect width="760" height="500" fill="#ffffff"/>

  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif">
    <text x="54" y="56" font-size="28" font-weight="bold">A sequence state is not a fresh computation each step. It carries earlier context forward and mixes it with the new input.</text>
    <text x="54" y="86" font-size="19">Reading the diagram from left to right shows how memory accumulates over time.</text>
  </g>

  <g fill="#eef2ff" stroke="#4c51bf" stroke-width="3">
    <rect x="94" y="162" width="76" height="52" rx="12"/>
    <rect x="292" y="162" width="76" height="52" rx="12"/>
    <rect x="490" y="162" width="76" height="52" rx="12"/>
  </g>
  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold">
    <text x="132" y="195" text-anchor="middle">x1</text>
    <text x="330" y="195" text-anchor="middle">x2</text>
    <text x="528" y="195" text-anchor="middle">x3</text>
  </g>

  <g fill="#e6fffa" stroke="#2f855a" stroke-width="3">
    <circle cx="132" cy="316" r="38"/>
    <circle cx="330" cy="316" r="38"/>
    <circle cx="528" cy="316" r="38"/>
  </g>
  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold">
    <text x="132" y="323" text-anchor="middle">h1</text>
    <text x="330" y="323" text-anchor="middle">h2</text>
    <text x="528" y="323" text-anchor="middle">h3</text>
  </g>

  <g stroke="#486581" stroke-width="4" stroke-linecap="round" fill="none">
    <line x1="132" y1="214" x2="132" y2="278"/>
    <line x1="330" y1="214" x2="330" y2="278"/>
    <line x1="528" y1="214" x2="528" y2="278"/>
    <line x1="170" y1="316" x2="292" y2="316"/>
    <line x1="368" y1="316" x2="490" y2="316"/>
    <polyline points="274,302 296,316 274,330"/>
    <polyline points="472,302 494,316 472,330"/>
  </g>

  <g fill="#486581" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold">
    <text x="184" y="296">carry context</text>
    <text x="382" y="296">carry more context</text>
  </g>

  <g fill="#fef3c7" stroke="#d97706" stroke-width="3">
    <rect x="182" y="252" width="96" height="52" rx="12"/>
    <rect x="380" y="252" width="96" height="52" rx="12"/>
  </g>
  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold">
    <text x="230" y="274" text-anchor="middle">combine</text>
    <text x="230" y="295" text-anchor="middle">h1 + x2</text>
    <text x="428" y="274" text-anchor="middle">combine</text>
    <text x="428" y="295" text-anchor="middle">h2 + x3</text>
  </g>

  <g fill="#334e68" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <text x="88" y="420">h1 knows only the first token.</text>
    <text x="262" y="420">h2 mixes new input x2 with the memory from h1.</text>
    <text x="484" y="420">h3 now carries information from x1, x2, and x3 together.</text>
    <text x="110" y="454">The later state does not restart from zero. It is a running summary of what has been seen so far.</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">Attention weight flow</title>
  <desc id="desc">A query compares with four keys, producing different scores, softmax weights, and a weighted sum over the corresponding values.</desc>
  <rect width="760" height="520" fill="#ffffff"/>

  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif">
    <text x="58" y="56" font-size="28" font-weight="bold">Attention is a score-to-weight-to-sum pipeline</text>
    <text x="58" y="86" font-size="19">The query does not average all tokens equally. It gives larger weights to the positions judged more relevant.</text>
  </g>

  <g fill="#eef2ff" stroke="#7c3aed" stroke-width="3">
    <circle cx="114" cy="258" r="26"/>
    <rect x="270" y="132" width="42" height="42" rx="8"/>
    <rect x="270" y="208" width="42" height="42" rx="8"/>
    <rect x="270" y="284" width="42" height="42" rx="8"/>
    <rect x="270" y="360" width="42" height="42" rx="8"/>
  </g>
  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold">
    <text x="114" y="264" text-anchor="middle">q</text>
    <text x="291" y="159" text-anchor="middle">k1</text>
    <text x="291" y="235" text-anchor="middle">k2</text>
    <text x="291" y="311" text-anchor="middle">k3</text>
    <text x="291" y="387" text-anchor="middle">k4</text>
  </g>

  <g stroke-linecap="round" fill="none">
    <line x1="138" y1="248" x2="270" y2="153" stroke="#d97706" stroke-width="5"/>
    <line x1="140" y1="258" x2="270" y2="229" stroke="#3366cc" stroke-width="3.5"/>
    <line x1="140" y1="266" x2="270" y2="305" stroke="#94a3b8" stroke-width="2.3"/>
    <line x1="138" y1="276" x2="270" y2="381" stroke="#cbd5e0" stroke-width="1.7"/>
  </g>

  <g fill="#334e68" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <text x="172" y="170">score 2.4</text>
    <text x="180" y="230">score 1.2</text>
    <text x="178" y="308">score 0.3</text>
    <text x="170" y="392">score -0.4</text>
  </g>

  <g fill="#f8fbff" stroke="#bfd3e6" stroke-width="2.5">
    <rect x="376" y="132" width="108" height="270" rx="18"/>
    <rect x="564" y="132" width="120" height="270" rx="18"/>
  </g>
  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold">
    <text x="430" y="162" text-anchor="middle">softmax weights</text>
    <text x="624" y="162" text-anchor="middle">weighted values</text>
  </g>

  <g fill="#d97706">
    <rect x="402" y="188" width="28" height="134" rx="6"/>
  </g>
  <g fill="#3366cc">
    <rect x="402" y="334" width="28" height="64" rx="6"/>
  </g>
  <g fill="#94a3b8">
    <rect x="448" y="370" width="28" height="28" rx="6"/>
  </g>
  <g fill="#cbd5e0">
    <rect x="448" y="382" width="28" height="16" rx="6"/>
  </g>

  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <text x="438" y="212">0.60</text>
    <text x="438" y="348">0.24</text>
    <text x="484" y="384">0.10</text>
    <text x="484" y="406">0.06</text>
  </g>

  <g fill="#e6fffa" stroke="#2f855a" stroke-width="3">
    <rect x="594" y="186" width="36" height="36" rx="8"/>
    <rect x="594" y="246" width="36" height="36" rx="8"/>
    <rect x="594" y="306" width="36" height="36" rx="8"/>
    <rect x="594" y="366" width="36" height="36" rx="8"/>
    <circle cx="650" cy="292" r="22"/>
  </g>
  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold">
    <text x="612" y="209" text-anchor="middle">v1</text>
    <text x="612" y="269" text-anchor="middle">v2</text>
    <text x="612" y="329" text-anchor="middle">v3</text>
    <text x="612" y="389" text-anchor="middle">v4</text>
    <text x="650" y="298" text-anchor="middle">out</text>
  </g>

  <g stroke="#2f855a" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="630" y1="204" x2="650" y2="272"/>
    <line x1="630" y1="264" x2="650" y2="282"/>
    <line x1="630" y1="324" x2="650" y2="302"/>
    <line x1="630" y1="384" x2="650" y2="314"/>
  </g>

  <g fill="#334e68" font-family="Arial, Helvetica, sans-serif" font-size="19">
    <text x="58" y="474">Large scores become large weights after softmax, so the final output is pulled more strongly toward the most relevant values.</text>
  </g>
</svg>

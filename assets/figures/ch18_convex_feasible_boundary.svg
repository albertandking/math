<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" role="img" aria-labelledby="title desc">
  <title id="title">Convex bowl, feasible region, and boundary optimum</title>
  <desc id="desc">A left panel shows a convex bowl with a single lowest point. A right panel shows the same level-set style bowl together with a triangular feasible region whose lowest feasible point lies on the boundary.</desc>
  <rect width="760" height="560" fill="#ffffff"/>

  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif">
    <text x="54" y="56" font-size="28" font-weight="bold">Convex structure makes local judgment trustworthy, constraints decide where the best feasible point can sit</text>
    <text x="54" y="86" font-size="19">Without constraints you search the whole bowl. With constraints you can only search inside the allowed region.</text>
  </g>

  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif">
    <text x="184" y="136" text-anchor="middle" font-size="24" font-weight="bold">unconstrained convex problem</text>
    <text x="564" y="136" text-anchor="middle" font-size="24" font-weight="bold">constrained problem</text>
  </g>

  <g stroke="#cbd5e0" stroke-width="2">
    <line x1="72" y1="430" x2="312" y2="430"/>
    <line x1="72" y1="350" x2="312" y2="350"/>
    <line x1="72" y1="270" x2="312" y2="270"/>
    <line x1="72" y1="190" x2="312" y2="190"/>

    <line x1="430" y1="430" x2="692" y2="430"/>
    <line x1="430" y1="350" x2="692" y2="350"/>
    <line x1="430" y1="270" x2="692" y2="270"/>
    <line x1="430" y1="190" x2="692" y2="190"/>
  </g>

  <g fill="none" stroke="#3366cc" stroke-width="4">
    <ellipse cx="192" cy="316" rx="94" ry="58"/>
    <ellipse cx="192" cy="316" rx="62" ry="38"/>
    <ellipse cx="192" cy="316" rx="30" ry="18"/>

    <ellipse cx="560" cy="316" rx="108" ry="64"/>
    <ellipse cx="560" cy="316" rx="74" ry="44"/>
    <ellipse cx="560" cy="316" rx="38" ry="22"/>
  </g>

  <g fill="#1f2937">
    <circle cx="192" cy="316" r="7"/>
  </g>
  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="19">
    <text x="204" y="306">global minimum</text>
    <text x="86" y="472">every local move points toward the same bowl bottom</text>
  </g>

  <g fill="#fef3c7" stroke="#d97706" stroke-width="4" opacity="0.82">
    <polygon points="490,220 650,246 598,404"/>
  </g>
  <g fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold">
    <text x="610" y="226">feasible region</text>
  </g>

  <g fill="#c53030">
    <circle cx="560" cy="316" r="7"/>
    <circle cx="590" cy="380" r="8"/>
  </g>
  <g stroke="#c53030" stroke-width="3.5" fill="none" stroke-dasharray="8 6">
    <line x1="560" y1="316" x2="590" y2="380"/>
  </g>
  <g fill="#c53030" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <text x="574" y="308">unconstrained</text>
    <text x="574" y="330">minimum</text>
    <text x="604" y="390">best feasible point</text>
    <text x="604" y="412">moves to the boundary</text>
  </g>

  <g stroke="#486581" stroke-width="4" stroke-linecap="round" fill="none">
    <line x1="320" y1="306" x2="398" y2="306"/>
    <polyline points="380,289 402,306 380,323"/>
  </g>
  <g fill="#486581" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="bold">
    <text x="332" y="278">add constraints</text>
  </g>

  <g fill="#334e68" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <text x="432" y="472">same convex bowl, but now only points inside the orange region are allowed</text>
    <text x="432" y="496">so the optimum may sit on the boundary instead of at the unconstrained bottom</text>
  </g>
</svg>

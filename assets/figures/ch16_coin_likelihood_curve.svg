<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">Coin likelihood curve</title>
  <desc id="desc">A curve shows the likelihood for observing seven heads and three tails, peaking near p equals 0.7.</desc>
  <rect width="760" height="520" fill="#ffffff"/>

  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif">
    <text x="72" y="56" font-size="28" font-weight="bold">Likelihood peaks near the observed frequency</text>
    <text x="72" y="86" font-size="19">For 7 heads and 3 tails, the candidate probability that explains the data best sits near p = 0.7.</text>
  </g>

  <g stroke="#d9e2ec" stroke-width="1.5">
    <line x1="110" y1="410" x2="680" y2="410"/>
    <line x1="110" y1="340" x2="680" y2="340"/>
    <line x1="110" y1="270" x2="680" y2="270"/>
    <line x1="110" y1="200" x2="680" y2="200"/>
    <line x1="110" y1="130" x2="680" y2="130"/>
    <line x1="190" y1="110" x2="190" y2="430"/>
    <line x1="290" y1="110" x2="290" y2="430"/>
    <line x1="390" y1="110" x2="390" y2="430"/>
    <line x1="490" y1="110" x2="490" y2="430"/>
    <line x1="590" y1="110" x2="590" y2="430"/>
  </g>

  <g stroke="#102a43" stroke-width="2.5">
    <line x1="110" y1="410" x2="680" y2="410"/>
    <line x1="110" y1="430" x2="110" y2="110"/>
  </g>
  <g fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="20">
    <text x="664" y="456">candidate p</text>
    <text x="46" y="136">likelihood</text>
  </g>

  <g fill="none" stroke="#3366cc" stroke-width="5">
    <path d="M 126 408 C 175 404, 218 392, 260 360 C 304 326, 352 256, 398 188 C 430 142, 470 122, 510 144 C 548 166, 590 226, 636 326 C 652 360, 665 389, 676 408"/>
  </g>

  <g stroke="#7c3aed" stroke-width="3.5" stroke-dasharray="9 7">
    <line x1="490" y1="410" x2="490" y2="132"/>
  </g>
  <g fill="#7c3aed">
    <circle cx="490" cy="144" r="7"/>
  </g>
  <g fill="#7c3aed" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">
    <text x="506" y="150">peak near p = 0.7</text>
  </g>

  <g fill="#334e68" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <text x="150" y="396">p too small</text>
    <text x="150" y="420">7 heads look unlikely</text>
    <text x="556" y="396">p too large</text>
    <text x="556" y="420">3 tails look unlikely</text>
  </g>

  <g stroke="#d97706" stroke-width="3.5" fill="none" stroke-linecap="round">
    <line x1="214" y1="354" x2="270" y2="310"/>
    <polyline points="245,311 274,307 266,334"/>
    <line x1="612" y1="306" x2="562" y2="258"/>
    <polyline points="559,286 558,254 588,264"/>
  </g>

  <g fill="#334e68" font-family="Arial, Helvetica, sans-serif" font-size="19">
    <text x="112" y="490">Maximum likelihood chooses the p value at the top of the curve because that candidate makes the observed data most natural.</text>
  </g>
</svg>
